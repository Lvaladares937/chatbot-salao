<!DOCTYPE html>
<html>
<head>
    <title>Agendamentos - Salão Vailson</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .agendamento { 
            background: white; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .data { color: #666; font-size: 0.9em; }
        .cliente { font-weight: bold; color: #2c3e50; }
        .servico { color: #27ae60; }
        .horario { color: #e67e22; }
    </style>
</head>
<body>
    <h1>📅 Agendamentos do Salão</h1>
    <div id="agendamentos"></div>

    <script>
        async function carregarAgendamentos() {
            try {
                const response = await fetch('agendamentos.json');
                const dados = await response.json();
                
                const div = document.getElementById('agendamentos');
                
                if (dados.length === 0) {
                    div.innerHTML = '<p>Nenhum agendamento encontrado.</p>';
                    return;
                }
                
                dados.reverse().forEach(ag => {
                    const dataAgendamento = new Date(ag.dataAgendamento).toLocaleString('pt-BR');
                    
                    div.innerHTML += `
                        <div class="agendamento">
                            <div class="data">📌 ${dataAgendamento}</div>
                            <div class="cliente">👤 ${ag.cliente.nome}</div>
                            <div class="servico">💇 ${ag.servico.nome}</div>
                            <div class="horario">📅 ${ag.servico.data} às ${ag.servico.horario}</div>
                            <div>📞 ${ag.cliente.telefone}</div>
                            <div>👨‍🎨 Profissional: ${ag.servico.profissional}</div>
                        </div>
                    `;
                });
                
            } catch (error) {
                document.getElementById('agendamentos').innerHTML = 
                    '<p>Erro ao carregar agendamentos. Crie um agendamento primeiro.</p>';
            }
        }
        
        carregarAgendamentos();
    </script>
</body>
</html>
